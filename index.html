<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Socks | Fleet Feet Vermont</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
 :root {
      --navy: #0D1B3E;
      --navy-deep: #071020;
      --navy-mid: #142348;
      --navy-light: #1e3160;
      --accent: #4A9EFF;
      --accent-glow: rgba(74,158,255,0.18);
      --white: #ffffff;
      --muted: #7a9cc4;
      --card-bg: #111f42;
      --card-border: rgba(74,158,255,0.15);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--navy-deep);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(74,158,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 90% 90%, rgba(13,27,62,0.8) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 40px;
      border-bottom: 1px solid rgba(74,158,255,0.12);
      background: rgba(7,16,32,0.7);
      backdrop-filter: blur(10px);
    }
    header img {
      height: 72px;
      width: auto;
      mix-blend-mode: lighten;
      filter: brightness(1.05);
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 72px 24px 56px;
    }
    .hero-eyebrow {
      display: inline-block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
      line-height: 1.1;
    }
    .hero h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(20px, 4vw, 36px);
      font-weight: 700;
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--white);
      margin-bottom: 20px;
    }
    .hero h1 span { color: var(--accent); }

    /* ── BRAND GRID ── */
    .grid-section {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 100px;
    }
    .brand-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 24px;
    }

    /* ── BRAND CARD ── */
    .brand-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }
    .brand-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 0 40px rgba(74,158,255,0.18), 0 20px 60px rgba(0,0,0,0.5);
      border-color: rgba(74,158,255,0.4);
    }
    .brand-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }
    .brand-img {
      width: 100%;
      aspect-ratio: 1/1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 90px;
      background: #ffffff;
      position: relative;
    }
    .brand-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 32px;
      transition: transform 0.4s ease;
    }
    .brand-card:hover .brand-img img { transform: scale(1.05); }
    .brand-info {
      padding: 18px 20px 20px;
      justify-content: center;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand-name-small {
      font-size: clamp(14px, 3vw, 22px);
      font-weight: 700;
      letter-spacing: 2px;
      text-align: center;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
      word-break: break-word;
    }
    .brand-tagline {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--white);
    }
    .brand-arrow {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent-glow);
      border: 1px solid rgba(74,158,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 16px;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s, transform 0.2s;
    }
    .brand-card:hover .brand-arrow {
      background: var(--accent);
      color: var(--navy-deep);
      transform: translateX(3px);
    }

    /* ── MODAL OVERLAY ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(5,12,28,0.9);
      backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open {
      display: flex;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── MODAL BOX ── */
    .modal-box {
      background: var(--navy-mid);
      border: 1px solid rgba(74,158,255,0.2);
      border-radius: 20px;
      width: 100%;
      max-width: 860px;
      max-height: 88vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
    }
    @keyframes slideUp {
      from { transform: translateY(24px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.08);
      border: none;
      color: var(--white);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 10;
    }
    .modal-close:hover { background: rgba(255,255,255,0.18); }

    /* Modal header */
    .modal-header {
      padding: 32px 36px 24px;
      border-bottom: 1px solid rgba(74,158,255,0.12);
    }
    .modal-brand-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .modal-brand-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 36px;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--white);
      line-height: 1;
      margin-bottom: 8px;
    }
    .modal-brand-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 540px;
    }

    /* Mini style cards grid inside modal */
    .styles-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 28px 36px 36px;
    }

    /* ── MINI STYLE CARD ── */
    .style-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(74,158,255,0.12);
      border-radius: 14px;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
    }
    .style-card:hover {
      border-color: rgba(74,158,255,0.4);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 20px rgba(74,158,255,0.1);
    }
    .style-card-img {
      width: 100%;
      aspect-ratio: 1/1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      background: #ffffff;
    }
    .style-card-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 16px;
    }
    .style-card-body {
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .style-card-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--white);
      line-height: 1.2;
    }
    .style-cta-row { margin-top: auto; padding-top: 10px; }
    .style-cta {
      display: block;
      text-align: center;
      background: rgba(74,158,255,0.1);
      border: 1px solid rgba(74,158,255,0.25);
      color: var(--accent);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 9px 10px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .style-card:hover .style-cta {
      background: var(--accent);
      color: var(--navy-deep);
      border-color: var(--accent);
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 28px 24px;
      border-top: 1px solid rgba(74,158,255,0.1);
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .brand-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
      .styles-grid { grid-template-columns: 1fr 1fr; padding: 20px; gap: 12px; }
      .modal-header { padding: 28px 20px 20px; }
      .modal-brand-title { font-size: 26px; }
    }
    @media (max-width: 400px) {
      .brand-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <img src="image/FF VT Logo (1).jpg" class="logo" alt="Fleet Feet Vermont" />
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-eyebrow">Free socks With Every regular priced shoe, bra, and clothing purchase.</div>
    <h1>Choose Your<br/><span>Free Socks</span></h1>
  </section>

  <!-- Brand Grid -->
  <section class="grid-section">
    <div class="brand-grid" id="brandGrid"></div>
  </section>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
    <div class="modal-box">
      <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
      <div class="modal-header">
        <div class="modal-brand-label" id="modalLabel"></div>
        <div class="modal-brand-title" id="modalTitle"></div>
        <div class="modal-brand-desc" id="modalDesc"></div>
      </div>
      <div class="styles-grid" id="stylesGrid"></div>
    </div>
  </div>

  <footer>
    &copy; 2026 Fleet Feet Vermont &nbsp;·&nbsp; Offer valid on regular price items only &nbsp;·&nbsp; While supplies last
  </footer>

<script>
  const brands = [
    {
      brand: "Darn Tough",
      emoji: "🧦",
      imgSrc: "image/darn-tough.jpg",
      tagline: "",
      desc: "Anatomically correct fit with targeted compression zones. Built for serious runners.",
      styles: [
        { name: "No Show Tab",        emoji: "🧦", imgSrc: "image/darntough-socks/ultra-light-no-show.webp",                    url: "#" },
        { name: "1/4 Sock",           emoji: "🧦", imgSrc: "image/darntough-socks/no-show-tab-ultra-with-cushion.webp",         url: "#" },
        { name: "Crew",               emoji: "🧦", imgSrc: "image/darntough-socks/micro-crew-light-ultra.webp",                 url: "#" },
        { name: "Lifestyle",          emoji: "🧦", imgSrc: "image/darntough-socks/bolt-micro-crew-ultra-lightweight-cushion.webp", url: "#" },
        { name: "Boot Sock",          emoji: "🧦", imgSrc: "image/darntough-socks/boot-sock.webp",                                                                   url: "#" },
        { name: "Micro Crew Hike",    emoji: "🧦", imgSrc: "image/darntough-socks/micro-crew.webp",                                                                   url: "#" },
      ]
    },
    {
      brand: "Wide Open",
      emoji: "🧦",
      imgSrc: "image/Wide_Open_Logo.jpg",
      tagline: "",
      desc: "South African-made with mohair fiber for unbeatable blister protection and all-day comfort.",
      styles: [
      { name: "Cushioned Crew",     imgSrc: "image/openwide/Cushioned%20Crew.jpg" },
{ name: "Wildwood Cushioned", imgSrc: "image/openwide/Wildwood%20Cushioned.jpg" }
      ]
    },
    {
      brand: "Balega",
      emoji: "🧦",
      imgSrc: "image/1-balega-logo-1.jpg",
      tagline: "",
      desc: "Made right here in Vermont with Merino wool. Guaranteed for life — seriously.",
      styles: [
        { name: "Hidden Comfort", emoji: "🧦", imgSrc: "image/balega/hidden-comfort.webp", url: "#" },
        { name: "Enduro 1/4",     emoji: "🧦", imgSrc: "image/balega/endro-1:4.webp",     url: "#" },
        { name: "Enduro Crew",    emoji: "🧦", imgSrc: "image/balega/enduro-crew.webp",    url: "#" },
        { name: "Silver Crew",    emoji: "🧦", imgSrc: "image/balega/silver-crew.webp",    url: "#" },
      ]
    },
    {
      brand: "Jogology",
      emoji: "🧦",
      imgSrc: "image/jogology-logo.webp",
      tagline: "",
      desc: "Clinically tested padding that reduces pressure, impact, and friction on your feet.",
      styles: [
        { name: "Low Cushion No Show",    emoji: "🧦", imgSrc: "image/jogology/jogology-low.webp",                  url: "#" },
        { name: "Medium Cushion No Show", emoji: "🧦", imgSrc: "image/jogology/jogology-medium.webp",               url: "#" },
        { name: "High Cushion No Show",   emoji: "🧦", imgSrc: "image/jogology/jogology-high-cushion-no-show.webp", url: "#" },
        { name: "Medium Cushion Quarter", emoji: "🧦", imgSrc: "image/jogology/medium-cushion-quarter.webp",        url: "#" },
      ]
    }
  ];

  const brandGrid = document.getElementById('brandGrid');

  brands.forEach((b, i) => {
    const imgEl = b.imgSrc ? `<img src="${b.imgSrc}" alt="${b.brand}" />` : b.emoji;
    const div = document.createElement('div');
    div.className = 'brand-card';
    div.dataset.index = i;
    div.tabIndex = 0;
    div.role = 'button';
    div.setAttribute('aria-label', `Browse ${b.brand} styles`);
    div.innerHTML = `
      <div class="brand-img">${imgEl}</div>
      <div class="brand-info">
        <div>
          <div class="brand-name-small">${b.brand}</div>
          <div class="brand-tagline">${b.tagline}</div>
        </div>
      </div>`;
    brandGrid.appendChild(div);
  });

  const overlay  = document.getElementById('modalOverlay');
  const closeBtn = document.getElementById('modalClose');

  function openModal(idx) {
    const b = brands[idx];
    document.getElementById('modalLabel').textContent = b.brand;
    document.getElementById('modalTitle').textContent = b.tagline + ' Collection';
    document.getElementById('modalDesc').textContent  = b.desc;

    const stylesGrid = document.getElementById('stylesGrid');
    stylesGrid.innerHTML = '';

    b.styles.forEach(s => {
      const imgEl = s.imgSrc ? `<img src="${s.imgSrc}" alt="${s.name}" />` : s.emoji;
      const a = document.createElement('a');
      a.href = s.url || '#';
      a.className = 'style-card';
      a.innerHTML = `
        <div class="style-card-img">${imgEl}</div>
        <div class="style-card-body">
          <div class="style-card-name">${s.name}</div>
          <div class="style-cta-row">
           
          </div>
        </div>`;
      stylesGrid.appendChild(a);
    });

    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  brandGrid.addEventListener('click', e => {
    const card = e.target.closest('.brand-card');
    if (card) openModal(parseInt(card.dataset.index));
  });
  brandGrid.addEventListener('keydown', e => {
    const card = e.target.closest('.brand-card');
    if (card && (e.key === 'Enter' || e.key === ' ')) { e.preventDefault(); openModal(parseInt(card.dataset.index)); }
  });

  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
